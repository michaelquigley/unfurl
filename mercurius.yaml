max_findings: 6

# review_context describes project posture and constraints. it calibrates
# reviewer rigor by stating what's true about the project: deployment model,
# stakes, scope, locked decisions, simplicity-vs-defensiveness preference. the
# reviewer suppresses findings that do not materially apply under this context.
review_context: |
  unfurl is a Go CLI utility for surgical markdown unwrapping: collapses
  soft line breaks inside paragraph content, preserves every other
  CommonMark/GFM construct byte-for-byte. personal tool, single supervised
  implementer; pre-1.0; breaking changes acceptable. prefer simple over
  highly defensive when both achieve correctness. out of scope:
  production-grade observability, multi-tenant concerns.

  settled and out of scope to relitigate at the project level:

  - public Go module path is github.com/michaelquigley/unfurl (this is
    why the df/dl trim prefix is "github.com/michaelquigley/" and not
    the "git.hq.quigley.com/products/" used by lore/archive).
  - layout follows lore's pattern: cmd/unfurl/main.go for the CLI,
    internal/ for library code, root package for the public API.
  - stack: Go 1.26+, spf13/cobra (no fang wrapper), df/dl for logging.
    no df/dd; unfurl has no configuration surface to bind.
  - implementation strategy is hand-rolled line tokenizer for the
    transform plus goldmark (with GFM + frontmatter extensions) only
    inside the property test. this was a deliberate planning-phase
    call; surface concrete bugs or gaps within the chosen approach
    rather than relitigating the choice.
  - byte fidelity is total: detect input line-ending discipline (LF vs
    CRLF) and emit in kind; preserve UTF-8 BOM; preserve absence of
    trailing newline.
  - CLI surface is unfurl [flags] [file] with -i/--in-place and
    -v/--verbose. no --version flag, no subcommands, no configuration.
  - v1 supports single-line reference definitions only; multi-line
    refdef body is a documented limitation, not a bug.
  - the spec's "deferred" section is binding: no re-wrapping, no
    formatting normalization (bullets/emphasis/heading/table padding),
    no linting, no rc files, no recursive mode, no file-watching, no
    editor plugins.

# review_focus directs the reviewer at project-specific surfaces that the base
# review philosophy does not already cover. the base prompt already carries
# the universal subtle-vs-obvious filter, so this field is typically just one
# paragraph naming the invariants or risks unique to this project.
review_focus: |
  unfurl's correctness rests on a small number of project-specific
  invariants. pay particular attention to:

  - AST equivalence modulo soft-break normalization: the property test
    comparator must be neither too lenient (false-pass under
    soft-break replacement of meaningful whitespace) nor too strict
    (false-fail on byte-significant nodes). flag any gap in the
    parser configuration (frontmatter, GFM tables, autolinks all must
    be on) or the comparator's normalization rules.
  - container prefix capture during paragraph reflow inside nested
    list-item and blockquote contexts. the emitted single line must
    reconstruct the original prefix exactly; deep nesting is the
    failure mode.
  - retroactive reclassification ordering: setext underline and GFM
    table-delimiter detection both require holding a paragraph in a
    buffer across a one-line lookahead before committing. mis-ordering
    leaks paragraph reflow into headings or tables.
  - hard-break preservation: both two-trailing-spaces and backslash
    markers must round-trip exactly as the author wrote them.
  - byte fidelity end-to-end: BOM, line endings, trailing-newline
    presence. idempotence is structural, not coincidental.
  - atomic in-place write: no half-written-file failure mode under
    interrupt.
  - property-test corpus breadth: seed must include the spec doc, real
    grimoire-style notes, and all spec scenarios — narrow corpus would
    give false confidence.

reviewer:
  name: codex
  impl: codex
  model: gpt-5.5
